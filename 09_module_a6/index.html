<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="background-image.jpeg" alt="Background" id="mainImage">
        <div class="spotlight" id="spotlight"></div>
    </div>
    <div class="info">
        <span>Spotlight: </span>
        <span id="size">100</span>
        <span>px | Scroll to resize | R = reset</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
