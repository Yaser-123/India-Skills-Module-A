<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Module A - Media Files</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }
        .container {
            max-width: 800px;

        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        .btn-module {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-module:hover {
            transform: scale(1.05);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }
        .module-item {
            margin-bottom: 20px;
        }
    </style>
</head>
