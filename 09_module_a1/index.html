<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Handle Price Slider</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="card">
        <div class="name">FILTER BY</div>
        <h1>Price Range</h1>
        <div class="range-slider">
            <div class="track"></div>
            <div class="range-fill" id="range-fill"></div>
            <input id="min-range" type="range">
            <input id="max-range" type="range">
        </div>
        <div class="value-row">
            <div class="value-block">
                <span class="value-label">MIN</span>
                <span class="value-number" id="min-value">$300</span>
            </div>
            <div class="value-block">
                <span class="value-label">MAX</span>
                <span class="value-number" id="max-value">$700</span>
            </div>
        </div>
        <div class="chips">
            <div class="chip" id="diff-label">Difference: $400</div>
            <div class="chip" id="percent-label">40% of range</div>
        </div>
    </div>
</body>
</html>
